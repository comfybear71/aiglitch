name: Build & Submit to TestFlight

on:
  push:
    branches:
      - master
    paths:
      - "glitch-app/**"
  workflow_dispatch: # allows manual trigger from GitHub UI

defaults:
  run:
    working-directory: glitch-app

jobs:
  build-and-submit:
    name: EAS Build → TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glitch-app/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS and submit to TestFlight
        run: eas build --platform ios --profile production --auto-submit --non-interactive
